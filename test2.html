<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Экзаменационный тест</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Segoe UI", Arial, sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 15px;
  color: white;
}

#app {
  width: 100%;
  max-width: 750px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  animation: fadeIn 0.6s ease;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
  font-weight: 600;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 20px;
}

.progress {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  transition: width 0.3s ease;
}

#question {
  font-size: 1.2em;
  margin-bottom: 20px;
  min-height: 60px;
}

.option {
  width: 100%;
  padding: 15px;
  margin: 8px 0;
  border-radius: 12px;
  border: 2px solid transparent;
  background: rgba(255,255,255,0.1);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 1em;
}

.option:hover {
  background: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.option.selected {
  border: 2px solid #00e676;
  background: rgba(0,230,118,0.2);
}

.nav {
  display: flex;
  justify-content: space-between;
  margin-top: 20px;
  gap: 10px;
}

.nav button {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
}

#backBtn {
  background: rgba(255,255,255,0.2);
  color: white;
}

#nextBtn {
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  color: white;
}

.nav button:hover {
  opacity: 0.8;
}

#result {
  text-align: center;
  font-size: 1.4em;
  margin-top: 25px;
  font-weight: bold;
}

@media (max-width: 480px) {
  #app {
    padding: 20px;
  }
  #question {
    font-size: 1.1em;
  }
  .option {
    padding: 18px;
  }
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div id="app">
  <h2>Экзаменационный тест</h2>

  <div class="progress-bar">
    <div class="progress" id="progressBar"></div>
  </div>

  <div id="question"></div>
  <div id="options"></div>

  <div class="nav">
    <button id="backBtn">Назад</button>
    <button id="nextBtn">Далее</button>
  </div>

  <div id="result"></div>
</div>

// ====== Перемешивание массива ======
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// ====== Подготовка вопросов ======
let questions = rawData.trim().split("\n").map(line => {
  const parts = line.split("|");

  const options = parts.slice(1, 6).map((text, index) => ({
    text,
    originalIndex: index
  }));

  const correctIndex = parseInt(parts[6]);

  return {
    question: parts[0],
    options,
    correctIndex
  };
});

// 🔥 Перемешиваем вопросы
questions = shuffle(questions);

// 🔥 Перемешиваем ответы в каждом вопросе
questions.forEach(q => {
  q.options = shuffle(q.options);
});

// ====== Логика теста ======
let currentQuestion = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const resultEl = document.getElementById("result");
const progressBar = document.getElementById("progressBar");

function showQuestion() {
  const q = questions[currentQuestion];

  questionEl.innerHTML =
    `<strong>${currentQuestion + 1}. ${q.question}</strong>`;

  optionsEl.innerHTML = "";

  q.options.forEach((option, index) => {
    const btn = document.createElement("div");
    btn.className = "option";
    btn.innerText = option.text;

    if (userAnswers[currentQuestion] === index) {
      btn.classList.add("selected");
    }

    btn.onclick = () => {
      userAnswers[currentQuestion] = index;
      showQuestion();
    };

    optionsEl.appendChild(btn);
  });

  progressBar.style.width =
    ((currentQuestion + 1) / questions.length) * 100 + "%";
}

nextBtn.onclick = () => {
  if (userAnswers[currentQuestion] == null) return;

  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    finishTest();
  }
};

backBtn.onclick = () => {
  if (currentQuestion > 0) {
    currentQuestion--;
    showQuestion();
  }
};

function finishTest() {
  let score = 0;

  questions.forEach((q, i) => {
    const selected = userAnswers[i];
    if (
      selected != null &&
      q.options[selected].originalIndex === q.correctIndex
    ) {
      score++;
    }
  });

  questionEl.innerHTML = "";
  optionsEl.innerHTML = "";
  nextBtn.style.display = "none";
  backBtn.style.display = "none";
  progressBar.style.width = "100%";

  resultEl.innerHTML =
    `Тест завершён<br><br>Результат: ${score} из ${questions.length}`;
}

showQuestion();

</script>
