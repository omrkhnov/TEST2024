const questions = rawData.trim().split("\n").map(line => {
  const parts = line.split("|");
  return {
    question: parts[0],
    options: parts.slice(1, 6),
    correct: parseInt(parts[6])
  };
});

let currentQuestion = 0;
let userAnswers = [];

const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");
const backBtn = document.getElementById("backBtn");
const progress = document.getElementById("progress");
const result = document.getElementById("result");

function showQuestion() {
  const q = questions[currentQuestion];
  quiz.innerHTML = `<p><strong>${currentQuestion + 1}. ${q.question}</strong></p>`;

  q.options.forEach((option, index) => {
    const btn = document.createElement("button");
    btn.innerText = option;

    if (userAnswers[currentQuestion] === index) {
      btn.classList.add("selected");
    }

    btn.onclick = function () {
      userAnswers[currentQuestion] = index;
      showQuestion();
    };

    quiz.appendChild(btn);
  });

  progress.innerText = `Вопрос ${currentQuestion + 1} из ${questions.length}`;
}

nextBtn.onclick = function () {
  if (userAnswers[currentQuestion] == null) return;

  currentQuestion++;

  if (currentQuestion < questions.length) {
    showQuestion();
  } else {
    finishTest();
  }
};

backBtn.onclick = function () {
  if (currentQuestion > 0) {
    currentQuestion--;
    showQuestion();
  }
};

function finishTest() {
  let score = 0;
  questions.forEach((q, index) => {
    if (userAnswers[index] === q.correct) score++;
  });

  quiz.innerHTML = "";
  nextBtn.style.display = "none";
  backBtn.style.display = "none";
  progress.innerText = "";
  result.innerText = `Тест завершён. Результат: ${score} из ${questions.length}`;
}

showQuestion();
</script>
